<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>نظام الحجوزات</title><style>body{margin:0;background:#10141d;color:#fff7ec;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Tahoma,Arial,sans-serif;padding-bottom:80px}*{box-sizing:border-box}main{max-width:820px;margin:auto;padding:16px}.card{background:#1b2430;border:1px solid #3a495c;border-radius:18px;padding:16px;margin:12px 0}input,button,textarea{width:100%;border-radius:13px;border:1px solid #3a495c;background:#253142;color:#fff7ec;padding:13px;font:inherit;font-size:16px}button{font-weight:900;margin-top:8px}.gold{background:#d7b46a;color:#17120a;border:0}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.muted{color:#c8b9aa;line-height:1.6}.hide{display:none!important}.tabs{position:fixed;bottom:0;left:0;right:0;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;background:#10141d;border-top:1px solid #3a495c;padding:8px 6px max(12px,env(safe-area-inset-bottom))}.tabs button{font-size:12px;margin:0}.tab{display:none}.tab.on{display:block}.item{border:1px solid #3a495c;border-radius:14px;padding:12px;margin:8px 0;background:#17202b}.toast{position:fixed;top:12px;left:12px;right:12px;z-index:9;display:none;background:#1b2430;border:1px solid #3a495c;border-radius:14px;padding:12px}.toast.on{display:block}@media(max-width:650px){.row{grid-template-columns:1fr}}</style></head><body><div id="toast" class="toast"></div><main><section id="login" class="card"><h1>نظام الحجوزات</h1><p class="muted">رابط مباشر بدون تحويل. أدخل اليوزر/PIN.</p><div class="row"><input id="wk" placeholder="Workspace / اليوزر"><input id="pin" type="password" placeholder="PIN"></div><button class="gold" id="pullBtn">دخول / سحب البيانات</button><button id="newBtn">إنشاء مساحة جديدة فارغة</button><p id="msg" class="muted">إذا أول مرة استخدم إنشاء مساحة جديدة.</p></section><section id="app" class="hide"><div class="card"><h2 id="name">نظام الحجوزات</h2><p id="status" class="muted"></p><button class="gold" id="saveBtn">رفع التعديلات</button></div><section id="home" class="tab on"><div class="card"><h2>الرئيسية</h2><p id="count" class="muted"></p></div></section><section id="chalets" class="tab"><div class="card"><h2>الشاليهات</h2><input id="chName" placeholder="اسم الشاليه"><button id="addCh">إضافة شاليه</button><div id="chList"></div></div></section><section id="bookings" class="tab"><div class="card"><h2>الحجوزات</h2><input id="cuName" placeholder="اسم العميل"><input id="cuPhone" placeholder="الجوال"><button id="addBk">إضافة حجز سريع</button><div id="bkList"></div></div></section><section id="settings" class="tab"><div class="card"><h2>الإعدادات</h2><input id="facility" placeholder="اسم المنشأة"><button id="setBtn">حفظ الاسم</button><button id="outBtn">خروج</button></div></section></section></main><nav id="nav" class="tabs hide"><button data-t="home">الرئيسية</button><button data-t="bookings">الحجوزات</button><button data-t="chalets">الشاليهات</button><button data-t="settings">الإعدادات</button></nav><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>const URL='https://fkqidesfrtpwzjcimjoe.supabase.co',KEY='sb_publishable_Uks_PYr6aqY5wnNBjDjTgg_z2Ic6_al';let sb,ws='',pw='',data=blank(),loaded=false;function blank(){return{schema_version:3,updated_at:'',settings:{facility_name:'',tag:'',holidays:[]},chalets:[],bookings:[]}}function c(){if(!window.supabase)throw Error('Supabase لم يعمل. تأكد من الإنترنت.');return sb||(sb=supabase.createClient(URL,KEY))}function toast(x){toast.textContent=x;toast.className='toast on';setTimeout(()=>toast.className='toast',3000)}function clean(x){return String(x||'').trim().toUpperCase()}function read(){ws=clean(wk.value);pw=pin.value.trim();if(!ws||pw.length<4)throw Error('اكتب اليوزر وPIN من 4 خانات أو أكثر')}function norm(x){x=x||blank();x.settings=x.settings||{};x.chalets=Array.isArray(x.chalets)?x.chalets:[];x.bookings=Array.isArray(x.bookings)?x.bookings:[];return x}async function pull(){try{read();msg.textContent='جاري السحب...';let r=await c().rpc('get_shared_workspace',{p_workspace_key:ws,p_access_pin:pw});if(r.error)throw r.error;data=norm(r.data);openApp();toast('تم الدخول')}catch(e){msg.textContent='فشل: '+(e.message||e)}}async function create(){try{read();msg.textContent='جاري الإنشاء...';let r=await c().rpc('save_shared_workspace',{p_workspace_key:ws,p_access_pin:pw,p_data:blank()});if(r.error)throw r.error;data=norm(r.data);openApp();toast('تم إنشاء المساحة')}catch(e){msg.textContent='فشل الإنشاء: '+(e.message||e)}}async function save(){try{let r=await c().rpc('save_shared_workspace',{p_workspace_key:ws,p_access_pin:pw,p_data:data});if(r.error)throw r.error;data=norm(r.data);render();toast('تم الرفع')}catch(e){toast('فشل الرفع: '+(e.message||e))}}function openApp(){login.classList.add('hide');app.classList.remove('hide');nav.classList.remove('hide');loaded=true;render()}function render(){name.textContent=data.settings.facility_name||'نظام الحجوزات';status.textContent='متصل: '+ws;count.textContent='الشاليهات: '+data.chalets.length+' / الحجوزات: '+data.bookings.length;facility.value=data.settings.facility_name||'';chList.innerHTML=data.chalets.map((x,i)=>'<div class=item>'+x.name+' <button onclick="delCh('+i+')">حذف</button></div>').join('')||'<p class=muted>لا توجد شاليهات</p>';bkList.innerHTML=data.bookings.map((x,i)=>'<div class=item>'+x.customer_name+' - '+x.customer_phone+' <button onclick="delBk('+i+')">حذف</button></div>').join('')||'<p class=muted>لا توجد حجوزات</p>'}function id(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}function addChalet(){if(!chName.value.trim())return toast('اكتب اسم الشاليه');data.chalets.push({id:id(),name:chName.value.trim(),capacity:0,description:'',contactPhone:'',workerPhone:'',workerName:'',mapUrl:'',terms:'',periods:[],deleted_at:null,updated_at:new Date().toISOString()});chName.value='';render()}function addBooking(){if(!cuName.value.trim())return toast('اكتب اسم العميل');data.bookings.push({id:id(),customer_name:cuName.value.trim(),customer_phone:cuPhone.value.trim(),chalet_id:data.chalets[0]?.id||'',booking_date:new Date().toISOString().slice(0,10),period_id:'',guests:1,total:0,paid:0,status:'confirmed',notes:'',deleted_at:null,created_at:new Date().toISOString(),updated_at:new Date().toISOString()});cuName.value='';cuPhone.value='';render()}function delCh(i){data.chalets.splice(i,1);render()}function delBk(i){data.bookings.splice(i,1);render()}pullBtn.onclick=pull;newBtn.onclick=create;saveBtn.onclick=save;addCh.onclick=addChalet;addBk.onclick=addBooking;setBtn.onclick=()=>{data.settings.facility_name=facility.value.trim();render()};outBtn.onclick=()=>location.reload();document.querySelectorAll('[data-t]').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));document.getElementById(b.dataset.t).classList.add('on')});</script></body></html>
