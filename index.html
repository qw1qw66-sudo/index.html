<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>نظام حجوزات الشاليهات</title>
<style>
:root{--bg:#10141d;--panel:#1b2430;--panel2:#263241;--text:#fff7ec;--muted:#c8baaa;--line:#3a495c;--gold:#d7b46a;--gold2:#f2d08a;--red:#e06b61;--green:#77b26d;--blue:#79adff}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:radial-gradient(circle at top,rgba(215,180,106,.12),transparent 34%),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif}body{padding:14px 14px 90px}button,input,select,textarea{font:inherit;color:inherit}button{min-height:42px;border:0;border-radius:14px;padding:10px 13px;font-weight:900;cursor:pointer}button:disabled{opacity:.5;cursor:not-allowed}input,select,textarea{width:100%;min-height:44px;border:1px solid var(--line);border-radius:14px;background:var(--panel2);color:var(--text);padding:11px 12px;font-size:16px;outline:none}textarea{min-height:82px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:var(--gold)}label{display:block;margin:0 0 6px;color:var(--muted);font-size:13px;font-weight:800}.page{max-width:1040px;margin:0 auto}.card,.item{background:linear-gradient(180deg,var(--panel),#151b25);border:1px solid var(--line);border-radius:22px;box-shadow:0 16px 36px rgba(0,0,0,.22)}.card{padding:16px;margin:12px 0}.item{padding:13px;margin:10px 0}.title{margin:0 0 8px;font-size:27px;font-weight:900;line-height:1.25}.subtitle{margin:0 0 14px;color:var(--muted);line-height:1.7}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:12px}.actions.between{justify-content:space-between}.primary{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#17120a}.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--line)}.danger{background:rgba(224,107,97,.16);color:var(--red);border:1px solid rgba(224,107,97,.45)}.okbtn{background:rgba(119,178,109,.16);color:var(--green);border:1px solid rgba(119,178,109,.45)}.tiny{min-height:34px;padding:7px 10px;font-size:13px}.debug{direction:ltr;text-align:left;white-space:pre-wrap;overflow:auto;min-height:150px;max-height:280px;padding:12px;border-radius:16px;background:#0b0f16;border:1px solid var(--line);color:#dce6f3;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;font-size:12px;line-height:1.55}.hidden{display:none!important}.ltr{direction:ltr;text-align:left}.muted{color:var(--muted)}.top{position:sticky;top:0;z-index:10;background:rgba(16,20,29,.94);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:18px;padding:12px;margin-bottom:10px}.toprow{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-top:12px}.tab-button{background:var(--panel2);color:var(--muted);border:1px solid var(--line);font-size:13px}.tab-button.active{color:#17120a;background:linear-gradient(135deg,var(--gold2),var(--gold));border-color:transparent}.view{display:none}.view.active{display:block}.badge{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:4px 9px;color:var(--muted);font-size:12px;font-weight:900}.badge.ok{color:var(--green);border-color:rgba(119,178,109,.45);background:rgba(119,178,109,.12)}.badge.bad{color:var(--red);border-color:rgba(224,107,97,.45);background:rgba(224,107,97,.12)}.badge.gold{color:var(--gold);border-color:rgba(215,180,106,.45);background:rgba(215,180,106,.12)}.empty{padding:24px;text-align:center;color:var(--muted)}.feedback{position:sticky;top:12px;z-index:20;margin:8px 0;padding:11px 13px;border-radius:15px;border:1px solid var(--line);background:#0b0f16;color:var(--muted)}.feedback.good{color:var(--green);border-color:rgba(119,178,109,.45)}.feedback.bad{color:var(--red);border-color:rgba(224,107,97,.45)}.editor{border:1px solid rgba(215,180,106,.35);background:rgba(215,180,106,.06)}.period-row{display:grid;grid-template-columns:1.3fr .8fr .8fr 1fr 1fr .7fr .7fr;gap:7px;align-items:end;margin:8px 0;padding:10px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.025)}.stat{font-size:25px;font-weight:900}.table-row{display:grid;grid-template-columns:1.2fr .8fr .8fr .8fr;gap:8px;align-items:center;border-bottom:1px solid var(--line);padding:9px 0}.status-confirmed{color:var(--green)}.status-pending{color:var(--gold)}.status-cancelled{color:var(--red)}.status-completed{color:var(--blue)}@media(max-width:760px){.grid,.grid3,.tabs,.table-row{grid-template-columns:1fr}.period-row{grid-template-columns:1fr 1fr}.title{font-size:24px}.toprow{display:block}.toprow .actions{margin-top:10px}}
</style>
</head>
<body>
<main class="page">
<section id="connectScreen" class="card" aria-labelledby="mainTitle">
<h1 id="mainTitle" class="title">نظام حجوزات الشاليهات</h1>
<p class="subtitle">أدخل رمز المساحة والرقم السري. هذه صفحة جذر نظيفة تعتمد على طلبات RPC فقط.</p>
<div class="grid"><div><label for="workspaceInput">Workspace</label><input id="workspaceInput" class="ltr" type="text" autocomplete="off" inputmode="text" placeholder="ALI6"></div><div><label for="pinInput">PIN</label><input id="pinInput" class="ltr" type="password" autocomplete="off" inputmode="numeric" placeholder="••••"></div></div>
<div class="actions"><button id="pullButton" class="primary" type="button">Pull</button><button id="createButton" class="secondary" type="button">Create empty workspace</button></div>
</section>
<section class="card" aria-labelledby="debugTitle"><h2 id="debugTitle" class="title">Debug Log</h2><div id="debugLog" class="debug" role="log" aria-live="polite"></div></section>
<section id="appShell" class="hidden">
<div id="feedback" class="feedback">جاهز</div>
<header class="top"><div class="toprow"><div><h2 class="title">نظام حجوزات الشاليهات</h2><p id="shellStatus" class="subtitle">لم يتم التحميل بعد.</p></div><div class="actions"><button id="uploadButton" class="primary" type="button" data-action="upload" disabled>Upload changes</button><span id="dirtyBadge" class="badge">لا توجد تغييرات</span></div></div><nav class="tabs" aria-label="App tabs"><button class="tab-button active" type="button" data-tab="home">الرئيسية</button><button class="tab-button" type="button" data-tab="chalets">الشاليهات</button><button class="tab-button" type="button" data-tab="bookings">الحجوزات</button><button class="tab-button" type="button" data-tab="reports">التقارير</button><button class="tab-button" type="button" data-tab="settings">الإعدادات</button></nav></header>
<section id="tab-home" class="view active"><div class="grid3"><div class="card"><div class="muted">الشاليهات</div><div id="homeChalets" class="stat">0</div></div><div class="card"><div class="muted">الحجوزات</div><div id="homeBookings" class="stat">0</div></div><div class="card"><div class="muted">المتبقي</div><div id="homeDue" class="stat">0</div></div></div><div class="card"><h3>أقرب الحجوزات</h3><div id="homeUpcoming"></div></div></section>
<section id="tab-chalets" class="view"><div class="card"><div class="actions between"><h3>الشاليهات</h3><button class="primary" type="button" data-action="new-chalet">+ شاليه جديد</button></div><div id="chaletList"></div></div><div id="chaletEditor" class="card editor hidden"><h3 id="chaletEditorTitle">شاليه</h3><input id="chaletId" type="hidden"><div class="grid"><div><label>الاسم</label><input id="chaletName"></div><div><label>السعة</label><input id="chaletCapacity" type="number" min="0"></div></div><label>الوصف</label><textarea id="chaletDescription"></textarea><div class="grid"><div><label>رقم التواصل</label><input id="chaletContactPhone" class="ltr"></div><div><label>رقم العامل</label><input id="chaletWorkerPhone" class="ltr"></div></div><div class="grid"><div><label>اسم العامل</label><input id="chaletWorkerName"></div><div><label>رابط الخريطة</label><input id="chaletMapUrl" class="ltr"></div></div><label>الشروط</label><textarea id="chaletTerms"></textarea><div class="actions between"><h4>الفترات</h4><button class="secondary" type="button" data-action="add-period">+ فترة</button></div><div id="periodEditorList"></div><div class="actions"><button class="primary" type="button" data-action="save-chalet">حفظ الشاليه</button><button class="secondary" type="button" data-action="cancel-chalet">إلغاء</button><button id="deleteChaletButton" class="danger" type="button" data-action="delete-chalet">حذف</button></div></div></section>
<section id="tab-bookings" class="view"><div class="card"><div class="actions between"><h3>الحجوزات</h3><button class="primary" type="button" data-action="new-booking">+ حجز جديد</button></div><div id="bookingList"></div></div><div id="bookingEditor" class="card editor hidden"><h3 id="bookingEditorTitle">حجز</h3><input id="bookingId" type="hidden"><div class="grid"><div><label>اسم العميل</label><input id="bookingCustomerName"></div><div><label>جوال العميل</label><input id="bookingCustomerPhone" class="ltr"></div></div><div class="grid"><div><label>الشاليه</label><select id="bookingChaletId"></select></div><div><label>التاريخ</label><input id="bookingDate" type="date"></div></div><div class="grid"><div><label>الفترة</label><select id="bookingPeriodId"></select></div><div><label>الضيوف</label><input id="bookingGuests" type="number" min="1"></div></div><div class="grid"><div><label>الإجمالي</label><input id="bookingTotal" type="number" min="0"></div><div><label>المدفوع</label><input id="bookingPaid" type="number" min="0"></div></div><label>الحالة</label><select id="bookingStatus"><option value="confirmed">مؤكد</option><option value="pending">معلق</option><option value="cancelled">ملغي</option><option value="completed">مكتمل</option></select><label>ملاحظات</label><textarea id="bookingNotes"></textarea><div class="actions"><button class="primary" type="button" data-action="save-booking">حفظ الحجز</button><button class="secondary" type="button" data-action="cancel-booking">إلغاء</button><button id="deleteBookingButton" class="danger" type="button" data-action="delete-booking">حذف</button></div></div></section>
<section id="tab-reports" class="view"><div class="card"><h3>التقارير</h3><div id="reportBox"></div></div></section>
<section id="tab-settings" class="view"><div class="card"><h3>الإعدادات</h3><div class="grid"><div><label>اسم المنشأة</label><input id="settingFacilityName"></div><div><label>الوصف</label><input id="settingTag"></div></div><div class="actions"><button class="primary" type="button" data-action="save-settings">حفظ الإعدادات</button></div><p class="muted">Workspace: <span id="settingsWorkspace" class="ltr"></span></p></div></section>
</section>
</main>
<script>
(function(){
'use strict';
const SUPABASE_URL='https://fkqidesfrtpwzjcimjoe.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_Uks_PYr6aqY5wnNBjDjTgg_z2Ic6_al';
let loadedWorkspace=null;let workspaceKey='';let accessPin='';let dirty=false;let editingChaletPeriods=[];
let state=emptyData();
function emptyData(){return{schema_version:2,settings:{facility_name:'',tag:'',holidays:[]},chalets:[],bookings:[]};}
function canonicalEmptyDataModel(){return emptyData();}
function uid(){return crypto.randomUUID?crypto.randomUUID():'id_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,10);}
function now(){return new Date().toISOString();}
function today(){return new Date().toISOString().slice(0,10);}
function ts(){return new Date().toISOString();}
function $(id){return document.getElementById(id);}
function qsa(sel){return Array.from(document.querySelectorAll(sel));}
function esc(v){return String(v??'').replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function money(n){return new Intl.NumberFormat('en-US').format(Number(n)||0);}
function log(message,detail){const el=$('debugLog');if(!el)return;const extra=detail===undefined?'':'\n'+JSON.stringify(detail,null,2);el.textContent='['+ts()+'] '+message+extra+'\n\n'+el.textContent;}
function feedback(message,type){const el=$('feedback');if(!el)return;el.textContent=message;el.className='feedback '+(type||'');}
function normalizeWorkspaceKey(value){return String(value||'').trim().toUpperCase().replace(/[^A-Z0-9_-]/g,'');}
function setConnectBusy(isBusy){$('pullButton').disabled=isBusy;$('createButton').disabled=isBusy;}
function setDirty(value,reason){dirty=Boolean(value);$('uploadButton').disabled=!dirty||!loadedWorkspace;$('dirtyBadge').textContent=dirty?'تغييرات غير مرفوعة':'لا توجد تغييرات';$('dirtyBadge').className='badge '+(dirty?'gold':'');if(reason)log('Dirty state changed',{dirty:dirty,reason:reason});}
function readCredentials(){workspaceKey=normalizeWorkspaceKey($('workspaceInput').value);accessPin=String($('pinInput').value||'').trim();$('workspaceInput').value=workspaceKey;if(!workspaceKey||workspaceKey.length<3)throw new Error('INVALID_WORKSPACE_KEY');if(!accessPin||accessPin.length<4)throw new Error('INVALID_PIN_LENGTH');return{workspaceKey:workspaceKey,pin:accessPin};}
async function callRpc(name,payload){const res=await fetch(SUPABASE_URL+'/rest/v1/rpc/'+name,{method:'POST',headers:{apikey:SUPABASE_ANON_KEY,Authorization:'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json',Accept:'application/json'},body:JSON.stringify(payload)});const text=await res.text();let body=null;try{body=text?JSON.parse(text):null;}catch(_){body={raw:text};}if(!res.ok){const err=new Error(body&&body.message?body.message:'RPC_FAILED');err.status=res.status;err.body=body;throw err;}return body;}
function normalizeData(raw){const src=raw&&raw.data?raw.data:raw||{};const out=emptyData();out.schema_version=Number(src.schema_version||2);out.settings=Object.assign(out.settings,src.settings||{});out.chalets=Array.isArray(src.chalets)?src.chalets.map(function(c){return{id:String(c.id||uid()),name:String(c.name||''),capacity:Number(c.capacity||0),description:String(c.description||''),contactPhone:String(c.contactPhone||''),workerPhone:String(c.workerPhone||''),workerName:String(c.workerName||''),mapUrl:String(c.mapUrl||''),terms:String(c.terms||''),periods:Array.isArray(c.periods)?c.periods.map(function(p,i){return{id:String(p.id||uid()),label:String(p.label||''),start:String(p.start||''),end:String(p.end||''),weekday_price:Number(p.weekday_price||0),weekend_price:Number(p.weekend_price||0),active:p.active!==false,sort:Number(p.sort??i),deleted_at:p.deleted_at||null};}):[],deleted_at:c.deleted_at||null,created_at:c.created_at||now(),updated_at:c.updated_at||now()};}):[];out.bookings=Array.isArray(src.bookings)?src.bookings.map(function(b){return{id:String(b.id||uid()),customer_name:String(b.customer_name||''),customer_phone:String(b.customer_phone||''),chalet_id:String(b.chalet_id||''),booking_date:String(b.booking_date||''),period_id:String(b.period_id||''),guests:Number(b.guests||1),total:Number(b.total||0),paid:Number(b.paid||0),status:String(b.status||'confirmed'),notes:String(b.notes||''),deleted_at:b.deleted_at||null,created_at:b.created_at||now(),updated_at:b.updated_at||now()};}):[];return out;}
function activeChalets(){return state.chalets.filter(function(c){return !c.deleted_at;});}
function activePeriods(chalet){return (chalet&&Array.isArray(chalet.periods)?chalet.periods:[]).filter(function(p){return !p.deleted_at;}).sort(function(a,b){return(Number(a.sort)||0)-(Number(b.sort)||0);});}
function activeBookings(){return state.bookings.filter(function(b){return !b.deleted_at;});}
function chaletName(id){const c=state.chalets.find(function(x){return x.id===id;});return c?c.name:'—';}
function periodName(chaletId,periodId){const c=state.chalets.find(function(x){return x.id===chaletId;});const p=activePeriods(c).find(function(x){return x.id===periodId;});return p?p.label:'—';}
function openApp(result){loadedWorkspace=result||{workspace_key:workspaceKey,updated_at:''};state=normalizeData(result&&result.data?result.data:state);$('connectScreen').classList.add('hidden');$('appShell').classList.remove('hidden');$('shellStatus').innerHTML='<span class="status-ok">متصل</span> · <span class="ltr">'+esc(loadedWorkspace.workspace_key||workspaceKey)+'</span> · <span class="ltr">'+esc(loadedWorkspace.updated_at||'')+'</span>';$('settingsWorkspace').textContent=loadedWorkspace.workspace_key||workspaceKey;setDirty(false,'open app');renderAll();log('App opened',{workspace_key:loadedWorkspace.workspace_key,data_shape:Object.keys(state)});}
async function pullWorkspace(){log('Pull button clicked');setConnectBusy(true);try{const c=readCredentials();log('Calling get_shared_workspace',{workspace_key:c.workspaceKey});const result=await callRpc('get_shared_workspace',{p_workspace_key:c.workspaceKey,p_access_pin:c.pin});if(!result||result.ok!==true)throw new Error('RPC_RESPONSE_NOT_OK');feedback('تم السحب بنجاح','good');log('Pull succeeded',{workspace_key:result.workspace_key,updated_at:result.updated_at});openApp(result);}catch(error){loadedWorkspace=null;feedback('فشل السحب: '+error.message,'bad');log('Pull failed; app shell remains closed',{message:error.message,status:error.status||null,body:error.body||null});}finally{setConnectBusy(false);}}
async function createWorkspace(){log('Create empty workspace button clicked');setConnectBusy(true);try{const c=readCredentials();const data=canonicalEmptyDataModel();log('Calling save_shared_workspace with canonical empty model',{workspace_key:c.workspaceKey,data:data});const result=await callRpc('save_shared_workspace',{p_workspace_key:c.workspaceKey,p_access_pin:c.pin,p_data:data});if(!result||result.ok!==true)throw new Error('RPC_RESPONSE_NOT_OK');feedback('تم إنشاء مساحة فارغة','good');log('Create empty workspace succeeded',{workspace_key:result.workspace_key,updated_at:result.updated_at});openApp(result);}catch(error){loadedWorkspace=null;feedback('فشل الإنشاء: '+error.message,'bad');log('Create failed; app shell remains closed',{message:error.message,status:error.status||null,body:error.body||null});}finally{setConnectBusy(false);}}
async function uploadChanges(){if(!loadedWorkspace){feedback('اسحب أو أنشئ مساحة أولًا','bad');return;}log('Calling save_shared_workspace for upload',{workspace_key:workspaceKey||loadedWorkspace.workspace_key});$('uploadButton').disabled=true;try{const result=await callRpc('save_shared_workspace',{p_workspace_key:workspaceKey||loadedWorkspace.workspace_key,p_access_pin:accessPin,p_data:state});if(!result||result.ok!==true)throw new Error('RPC_RESPONSE_NOT_OK');loadedWorkspace=result;state=normalizeData(result.data);$('shellStatus').innerHTML='<span class="status-ok">متصل</span> · <span class="ltr">'+esc(result.workspace_key)+'</span> · <span class="ltr">'+esc(result.updated_at)+'</span>';setDirty(false,'uploaded');renderAll();feedback('تم رفع التغييرات','good');log('Upload succeeded',{updated_at:result.updated_at});}catch(error){$('uploadButton').disabled=false;feedback('فشل الرفع: '+error.message,'bad');log('Upload failed',{message:error.message,status:error.status||null,body:error.body||null});}}
function showTab(tab){qsa('.tab-button').forEach(function(b){b.classList.toggle('active',b.dataset.tab===tab);});qsa('.view').forEach(function(v){v.classList.toggle('active',v.id==='tab-'+tab);});feedback('فتح تبويب: '+tab,'');log('Tab changed',{tab:tab});}
function renderAll(){renderHome();renderChalets();renderBookings();renderReports();renderSettings();}
function renderHome(){const bookings=activeBookings();const due=bookings.reduce(function(s,b){return s+Math.max(0,(Number(b.total)||0)-(Number(b.paid)||0));},0);$('homeChalets').textContent=activeChalets().length;$('homeBookings').textContent=bookings.length;$('homeDue').textContent=money(due);$('homeUpcoming').innerHTML=bookings.slice().sort(function(a,b){return a.booking_date.localeCompare(b.booking_date);}).slice(0,5).map(bookingCard).join('')||'<div class="empty">لا توجد حجوزات</div>';}
function renderChalets(){const rows=activeChalets().map(function(c){return'<div class="item"><div class="actions between"><div><b>'+esc(c.name||'بدون اسم')+'</b><div class="muted">السعة: '+esc(c.capacity)+' · الفترات: '+activePeriods(c).length+'</div></div><div class="actions"><button class="secondary tiny" type="button" data-action="edit-chalet" data-id="'+esc(c.id)+'">تعديل</button><button class="danger tiny" type="button" data-action="soft-delete-chalet" data-id="'+esc(c.id)+'">حذف</button></div></div></div>';}).join('');$('chaletList').innerHTML=rows||'<div class="empty">لا توجد شاليهات</div>';}
function renderBookings(){const rows=activeBookings().slice().sort(function(a,b){return b.booking_date.localeCompare(a.booking_date);}).map(bookingCard).join('');$('bookingList').innerHTML=rows||'<div class="empty">لا توجد حجوزات</div>';fillBookingSelects();}
function bookingCard(b){return'<div class="item"><div class="actions between"><div><b>'+esc(b.customer_name||'بدون اسم')+'</b><div class="muted">'+esc(chaletName(b.chalet_id))+' · '+esc(periodName(b.chalet_id,b.period_id))+' · '+esc(b.booking_date||'—')+'</div><span class="badge '+(b.status==='confirmed'?'ok':b.status==='cancelled'?'bad':'gold')+'">'+esc(statusText(b.status))+'</span></div><div><b>'+money(b.total)+' ر.س</b><div class="muted">مدفوع '+money(b.paid)+' · ضيوف '+esc(b.guests)+'</div></div><div class="actions"><button class="secondary tiny" type="button" data-action="edit-booking" data-id="'+esc(b.id)+'">تعديل</button><button class="danger tiny" type="button" data-action="soft-delete-booking" data-id="'+esc(b.id)+'">حذف</button></div></div></div>';}
function statusText(s){return{confirmed:'مؤكد',pending:'معلق',cancelled:'ملغي',completed:'مكتمل'}[s]||s;}
function renderReports(){const bookings=activeBookings();const total=bookings.reduce(function(s,b){return s+(Number(b.total)||0);},0);const paid=bookings.reduce(function(s,b){return s+(Number(b.paid)||0);},0);const due=total-paid;const byStatus={confirmed:0,pending:0,cancelled:0,completed:0};bookings.forEach(function(b){byStatus[b.status]=(byStatus[b.status]||0)+1;});$('reportBox').innerHTML='<div class="grid3"><div class="item"><div class="muted">الإجمالي</div><div class="stat">'+money(total)+'</div></div><div class="item"><div class="muted">المدفوع</div><div class="stat">'+money(paid)+'</div></div><div class="item"><div class="muted">المتبقي</div><div class="stat">'+money(due)+'</div></div></div><div class="item"><b>حسب الحالة</b><p>مؤكد: '+byStatus.confirmed+' · معلق: '+byStatus.pending+' · مكتمل: '+byStatus.completed+' · ملغي: '+byStatus.cancelled+'</p></div>';}
function renderSettings(){$('settingFacilityName').value=state.settings.facility_name||'';$('settingTag').value=state.settings.tag||'';$('settingsWorkspace').textContent=(loadedWorkspace&&loadedWorkspace.workspace_key)||workspaceKey||'';}
function newChalet(){editingChaletPeriods=[];$('chaletEditorTitle').textContent='شاليه جديد';$('chaletId').value='';$('chaletName').value='';$('chaletCapacity').value='0';$('chaletDescription').value='';$('chaletContactPhone').value='';$('chaletWorkerPhone').value='';$('chaletWorkerName').value='';$('chaletMapUrl').value='';$('chaletTerms').value='';$('deleteChaletButton').classList.add('hidden');$('chaletEditor').classList.remove('hidden');renderPeriodEditor();feedback('تم فتح نموذج شاليه جديد','');}
function editChalet(id){const c=state.chalets.find(function(x){return x.id===id;});if(!c)return feedback('الشاليه غير موجود','bad');editingChaletPeriods=(c.periods||[]).map(function(p){return Object.assign({},p);});$('chaletEditorTitle').textContent='تعديل شاليه';$('chaletId').value=c.id;$('chaletName').value=c.name;$('chaletCapacity').value=c.capacity;$('chaletDescription').value=c.description;$('chaletContactPhone').value=c.contactPhone;$('chaletWorkerPhone').value=c.workerPhone;$('chaletWorkerName').value=c.workerName;$('chaletMapUrl').value=c.mapUrl;$('chaletTerms').value=c.terms;$('deleteChaletButton').classList.remove('hidden');$('chaletEditor').classList.remove('hidden');renderPeriodEditor();feedback('تم فتح تعديل الشاليه','');}
function renderPeriodEditor(){editingChaletPeriods.sort(function(a,b){return(Number(a.sort)||0)-(Number(b.sort)||0);});$('periodEditorList').innerHTML=editingChaletPeriods.filter(function(p){return !p.deleted_at;}).map(function(p){return'<div class="period-row" data-period-id="'+esc(p.id)+'"><div><label>label</label><input data-period-field="label" value="'+esc(p.label)+'"></div><div><label>start</label><input data-period-field="start" type="time" value="'+esc(p.start)+'"></div><div><label>end</label><input data-period-field="end" type="time" value="'+esc(p.end)+'"></div><div><label>weekday</label><input data-period-field="weekday_price" type="number" min="0" value="'+esc(p.weekday_price)+'"></div><div><label>weekend</label><input data-period-field="weekend_price" type="number" min="0" value="'+esc(p.weekend_price)+'"></div><div><label>sort</label><input data-period-field="sort" type="number" value="'+esc(p.sort)+'"></div><div><label>active</label><select data-period-field="active"><option value="true" '+(p.active?'selected':'')+'>نعم</option><option value="false" '+(!p.active?'selected':'')+'>لا</option></select><button class="danger tiny" type="button" data-action="delete-period" data-id="'+esc(p.id)+'">حذف</button></div></div>';}).join('')||'<div class="empty">لا توجد فترات</div>';}
function syncPeriodInputs(){qsa('[data-period-id]').forEach(function(row){const id=row.dataset.periodId;const p=editingChaletPeriods.find(function(x){return x.id===id;});if(!p)return;row.querySelectorAll('[data-period-field]').forEach(function(input){const f=input.dataset.periodField;let val=input.value;if(f==='weekday_price'||f==='weekend_price'||f==='sort')val=Number(val)||0;if(f==='active')val=val==='true';p[f]=val;});});}
function addPeriod(){syncPeriodInputs();editingChaletPeriods.push({id:uid(),label:'فترة جديدة',start:'07:00',end:'17:00',weekday_price:0,weekend_price:0,active:true,sort:editingChaletPeriods.length,deleted_at:null});renderPeriodEditor();feedback('تمت إضافة فترة','good');log('Period added');}
function deletePeriod(id){syncPeriodInputs();const p=editingChaletPeriods.find(function(x){return x.id===id;});if(p){p.deleted_at=now();renderPeriodEditor();feedback('تم حذف الفترة محليًا','good');log('Period soft deleted',{id:id});}}
function saveChalet(){syncPeriodInputs();const id=$('chaletId').value||uid();const old=state.chalets.find(function(x){return x.id===id;});const c={id:id,name:$('chaletName').value.trim(),capacity:Number($('chaletCapacity').value)||0,description:$('chaletDescription').value.trim(),contactPhone:$('chaletContactPhone').value.trim(),workerPhone:$('chaletWorkerPhone').value.trim(),workerName:$('chaletWorkerName').value.trim(),mapUrl:$('chaletMapUrl').value.trim(),terms:$('chaletTerms').value.trim(),periods:editingChaletPeriods.map(function(p){return Object.assign({},p);}),deleted_at:null,created_at:old?old.created_at:now(),updated_at:now()};if(!c.name)return feedback('اسم الشاليه مطلوب','bad');if(old)Object.assign(old,c);else state.chalets.push(c);$('chaletEditor').classList.add('hidden');setDirty(true,'save chalet');renderAll();feedback('تم حفظ الشاليه محليًا','good');log('Chalet saved',{id:id,periods:c.periods.length});}
function softDeleteChalet(id){const c=state.chalets.find(function(x){return x.id===id;});if(!c)return; c.deleted_at=now();c.updated_at=now();activeBookings().forEach(function(b){if(b.chalet_id===id){b.deleted_at=now();b.updated_at=now();}});$('chaletEditor').classList.add('hidden');setDirty(true,'soft delete chalet');renderAll();feedback('تم حذف الشاليه محليًا','good');log('Chalet soft deleted',{id:id});}
function cancelChalet(){$('chaletEditor').classList.add('hidden');feedback('تم إلغاء تعديل الشاليه','');log('Chalet edit cancelled');}
function fillBookingSelects(){const chSel=$('bookingChaletId');const oldCh=chSel.value;chSel.innerHTML=activeChalets().map(function(c){return'<option value="'+esc(c.id)+'">'+esc(c.name)+'</option>';}).join('');if(oldCh)chSel.value=oldCh;fillPeriodSelect();}
function fillPeriodSelect(){const ch=state.chalets.find(function(c){return c.id===$('bookingChaletId').value;});const old=$('bookingPeriodId').value;$('bookingPeriodId').innerHTML=activePeriods(ch).filter(function(p){return p.active!==false;}).map(function(p){return'<option value="'+esc(p.id)+'">'+esc(p.label)+' ('+esc(p.start)+'-'+esc(p.end)+')</option>';}).join('');if(old)$('bookingPeriodId').value=old;}
function newBooking(){if(!activeChalets().length){feedback('أضف شاليه وفترة أولًا','bad');return;}$('bookingEditorTitle').textContent='حجز جديد';$('bookingId').value='';$('bookingCustomerName').value='';$('bookingCustomerPhone').value='';fillBookingSelects();$('bookingDate').value=today();$('bookingGuests').value='1';$('bookingTotal').value='0';$('bookingPaid').value='0';$('bookingStatus').value='confirmed';$('bookingNotes').value='';$('deleteBookingButton').classList.add('hidden');$('bookingEditor').classList.remove('hidden');feedback('تم فتح نموذج حجز جديد','');}
function editBooking(id){const b=state.bookings.find(function(x){return x.id===id;});if(!b)return feedback('الحجز غير موجود','bad');$('bookingEditorTitle').textContent='تعديل حجز';$('bookingId').value=b.id;$('bookingCustomerName').value=b.customer_name;$('bookingCustomerPhone').value=b.customer_phone;fillBookingSelects();$('bookingChaletId').value=b.chalet_id;fillPeriodSelect();$('bookingPeriodId').value=b.period_id;$('bookingDate').value=b.booking_date;$('bookingGuests').value=b.guests;$('bookingTotal').value=b.total;$('bookingPaid').value=b.paid;$('bookingStatus').value=b.status;$('bookingNotes').value=b.notes;$('deleteBookingButton').classList.remove('hidden');$('bookingEditor').classList.remove('hidden');feedback('تم فتح تعديل الحجز','');}
function saveBooking(){const id=$('bookingId').value||uid();const old=state.bookings.find(function(x){return x.id===id;});const b={id:id,customer_name:$('bookingCustomerName').value.trim(),customer_phone:$('bookingCustomerPhone').value.trim(),chalet_id:$('bookingChaletId').value,booking_date:$('bookingDate').value,period_id:$('bookingPeriodId').value,guests:Number($('bookingGuests').value)||1,total:Number($('bookingTotal').value)||0,paid:Number($('bookingPaid').value)||0,status:$('bookingStatus').value,notes:$('bookingNotes').value.trim(),deleted_at:null,created_at:old?old.created_at:now(),updated_at:now()};if(!b.customer_name)return feedback('اسم العميل مطلوب','bad');if(!b.chalet_id||!b.period_id)return feedback('اختر الشاليه والفترة','bad');if(old)Object.assign(old,b);else state.bookings.push(b);$('bookingEditor').classList.add('hidden');setDirty(true,'save booking');renderAll();feedback('تم حفظ الحجز محليًا','good');log('Booking saved',{id:id});}
function softDeleteBooking(id){const b=state.bookings.find(function(x){return x.id===id;});if(!b)return;b.deleted_at=now();b.updated_at=now();$('bookingEditor').classList.add('hidden');setDirty(true,'soft delete booking');renderAll();feedback('تم حذف الحجز محليًا','good');log('Booking soft deleted',{id:id});}
function cancelBooking(){$('bookingEditor').classList.add('hidden');feedback('تم إلغاء تعديل الحجز','');log('Booking edit cancelled');}
function saveSettings(){state.settings.facility_name=$('settingFacilityName').value.trim();state.settings.tag=$('settingTag').value.trim();setDirty(true,'save settings');renderAll();feedback('تم حفظ الإعدادات محليًا','good');log('Settings saved');}
function handleAction(action,id){if(action==='upload')return uploadChanges();if(!loadedWorkspace){feedback('اسحب أو أنشئ مساحة أولًا','bad');log('Blocked action before workspace load',{action:action});return;}if(action==='new-chalet')return newChalet();if(action==='edit-chalet')return editChalet(id);if(action==='soft-delete-chalet')return softDeleteChalet(id);if(action==='add-period')return addPeriod();if(action==='delete-period')return deletePeriod(id);if(action==='save-chalet')return saveChalet();if(action==='cancel-chalet')return cancelChalet();if(action==='delete-chalet')return softDeleteChalet($('chaletId').value);if(action==='new-booking')return newBooking();if(action==='edit-booking')return editBooking(id);if(action==='soft-delete-booking')return softDeleteBooking(id);if(action==='save-booking')return saveBooking();if(action==='cancel-booking')return cancelBooking();if(action==='delete-booking')return softDeleteBooking($('bookingId').value);if(action==='save-settings')return saveSettings();}
document.addEventListener('DOMContentLoaded',function(){log('DOMContentLoaded: attaching event listeners');$('pullButton').addEventListener('click',pullWorkspace);$('createButton').addEventListener('click',createWorkspace);document.addEventListener('click',function(event){const btn=event.target.closest('button');if(!btn)return;log('Button clicked',{text:btn.textContent.trim(),action:btn.dataset.action||null,tab:btn.dataset.tab||null});if($('feedback'))feedback('تم الضغط: '+btn.textContent.trim(),'');},true);qsa('.tab-button').forEach(function(btn){btn.addEventListener('click',function(){showTab(btn.dataset.tab);});});document.addEventListener('click',function(event){const btn=event.target.closest('[data-action]');if(!btn)return;handleAction(btn.dataset.action,btn.dataset.id||'');});$('bookingChaletId').addEventListener('change',function(){fillPeriodSelect();feedback('تم تحديث الفترات حسب الشاليه','');log('Booking chalet changed',{chalet_id:this.value});});$('bookingPeriodId').addEventListener('change',function(){feedback('تم اختيار الفترة','');log('Booking period changed',{period_id:this.value});});log('Ready');});
})();
</script>
</body>
