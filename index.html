<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>التقارير – حسابتي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ─── reset ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    /* ─── tokens ─── */
    :root {
      --cyan:        #3DD9D6;
      --cyan-dim:    rgba(61,217,214,.13);
      --cyan-glow:   0 0 0 3px rgba(61,217,214,.28);
      --text-hi:     #1F2937;
      --text-mid:    #374151;
      --text-lo:     #6B7280;
      --bg:          #FFFFFF;
      --bg-soft:     #F8FAFC;
      --border:      #E5E7EB;
      --sh-xs:       0 1px 3px rgba(0,0,0,.05);
      --sh-sm:       0 2px 8px rgba(0,0,0,.07);
      --sh-md:       0 4px 16px rgba(0,0,0,.09);
    }

    /* ─── base ─── */
    html, body {
      font-family: 'Tajawal', sans-serif;
      direction: rtl;
      background: var(--bg-soft);
      color: var(--text-hi);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* ════════════════════════════════════════
       HEADER
    ════════════════════════════════════════ */
    .header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 7px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 120;
      box-shadow: var(--sh-sm);
    }

    .brand { display: flex; align-items: center; gap: 9px; }

    .logo-ring {
      width: 38px; height: 38px;
      background: var(--cyan);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(61,217,214,.4);
    }
    .logo-ring span {
      color: #fff; font-size: 19px; font-weight: 800;
      letter-spacing: -1px; line-height: 1;
    }

    .brand-words { display: flex; flex-direction: column; }
    .company-name { font-size: 12.5px; font-weight: 700; color: var(--text-hi); line-height: 1.35; }
    .product-name { font-size: 10.5px; font-weight: 600; color: var(--cyan); letter-spacing: .3px; }

    .hdr-actions { display: flex; align-items: center; gap: 6px; }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg,#7C3AED,#4F46E5);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 13px; font-weight: 700; flex-shrink: 0;
    }

    .qbar { display: flex; align-items: center; gap: 1px; }

    .q-btn {
      width: 29px; height: 29px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px; color: #9CA3AF;
      transition: background .15s, color .15s;
    }
    .q-btn:hover { background: var(--bg-soft); color: var(--text-hi); }

    .bell-wrap { position: relative; }
    .bell-badge {
      position: absolute; top: 1px; left: 1px;
      min-width: 15px; height: 15px;
      background: #EF4444; border-radius: 10px;
      font-size: 8.5px; color: #fff; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      border: 1.5px solid #fff; padding: 0 2px;
      pointer-events: none;
    }

    .hamburger {
      display: none; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 7px; color: var(--text-lo);
      transition: background .15s;
    }
    .hamburger:hover { background: var(--bg-soft); }

    /* ════════════════════════════════════════
       SUB-HEADER  (lang pill + clock)
    ════════════════════════════════════════ */
    .sub-hdr {
      background: #fff;
      padding: 5px 14px 6px;
      display: flex; align-items: center;
      justify-content: flex-end;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .lang-pill {
      background: var(--cyan); color: #fff;
      font-size: 10.5px; font-weight: 700;
      padding: 2px 11px; border-radius: 20px;
    }
    #clock {
      font-size: 11.5px; color: var(--text-lo);
      direction: ltr; font-variant-numeric: tabular-nums; font-weight: 500;
    }

    /* ════════════════════════════════════════
       PRIMARY TAB BAR
    ════════════════════════════════════════ */
    .tab-bar {
      background: #fff;
      border-bottom: 2px solid var(--border);
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      position: sticky; top: 54px; z-index: 110;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-list {
      display: flex;
      padding: 0 10px;
      min-width: max-content;
    }

    .tab-item {
      display: flex; align-items: center; gap: 5px;
      padding: 10px 13px 8px;
      font-size: 12.5px; font-weight: 500; color: var(--text-lo);
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      white-space: nowrap; user-select: none; cursor: pointer;
      transition: color .18s, border-color .18s;
    }
    .tab-item:hover:not(.active) { color: var(--text-mid); }
    .tab-item.active { color: var(--cyan); border-bottom-color: var(--cyan); font-weight: 700; }
    .tab-icon { width: 15px; height: 15px; flex-shrink: 0; }

    /* ════════════════════════════════════════
       MOBILE DRAWER
    ════════════════════════════════════════ */
    .drawer-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 300;
      backdrop-filter: blur(2px);
    }
    .drawer-overlay.open { display: block; }

    .drawer {
      position: absolute; top: 0; right: 0;
      width: 265px; height: 100%;
      background: #fff; padding: 16px;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
    }
    .drawer-overlay.open .drawer { transform: translateX(0); }

    .drawer-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .drawer-title { font-size: 14px; font-weight: 700; }
    .drawer-close {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px; color: var(--text-lo); transition: background .15s;
    }
    .drawer-close:hover { background: var(--bg-soft); }

    .drawer-tab {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 10px; border-radius: 8px;
      font-size: 13.5px; font-weight: 500; color: var(--text-lo);
      cursor: pointer; transition: all .15s; user-select: none;
    }
    .drawer-tab:hover { background: var(--bg-soft); color: var(--text-hi); }
    .drawer-tab.active { background: var(--cyan-dim); color: var(--cyan); font-weight: 700; }

    /* ════════════════════════════════════════
       MODULE ICON STRIP
    ════════════════════════════════════════ */
    .module-section {
      background: #fff;
      border-bottom: 3px solid var(--cyan);
      padding-top: 14px;
    }

    .module-strip {
      display: flex;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 0 10px;
      gap: 0;
    }
    .module-strip::-webkit-scrollbar { display: none; }

    .mod-item {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      padding: 4px 6px 14px;
      min-width: 74px; max-width: 84px; flex-shrink: 0;
      cursor: pointer; user-select: none; position: relative;
      transition: transform .2s;
    }
    .mod-item:hover { transform: translateY(-2px); }
    .mod-item.active { transform: scale(1.04) translateY(-1px); }

    .mod-icon-bg {
      width: 52px; height: 52px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg-soft);
      box-shadow: var(--sh-xs);
      transition: background .2s, box-shadow .2s;
      overflow: hidden;
    }
    .mod-item:hover .mod-icon-bg { box-shadow: var(--sh-sm); }
    .mod-item.active .mod-icon-bg {
      background: var(--cyan);
      box-shadow: var(--cyan-glow), var(--sh-sm);
    }
    .mod-item.active .mod-icon-bg svg { filter: brightness(0) invert(1); }

    .mod-label {
      font-size: 9.5px; color: var(--text-lo);
      text-align: center; line-height: 1.35;
      font-weight: 500; max-width: 74px;
    }
    .mod-item.active .mod-label { color: var(--cyan); font-weight: 700; }

    .mod-tail {
      position: absolute; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 9px solid transparent;
      border-right: 9px solid transparent;
      border-top: 9px solid var(--cyan);
      display: none;
    }
    .mod-item.active .mod-tail { display: block; }

    /* ════════════════════════════════════════
       SUB-REPORTS PANEL
    ════════════════════════════════════════ */
    .reports-section { background: #fff; padding: 20px 18px 36px; }

    .reports-heading {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; font-weight: 700; color: var(--text-hi);
      margin-bottom: 16px;
    }
    .reports-heading-bar {
      width: 4px; height: 19px; border-radius: 2px;
      background: var(--cyan); flex-shrink: 0;
    }

    .reports-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px 12px;
    }

    .report-row {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 10px; border-radius: 8px;
      font-size: 13px; font-weight: 500; color: var(--text-mid);
      cursor: pointer; transition: background .14s, color .14s;
    }
    .report-row:hover { background: var(--cyan-dim); color: var(--cyan); }

    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--cyan); flex-shrink: 0;
    }

    .empty-state {
      grid-column: 1/-1; text-align: center; padding: 28px;
      font-size: 13px; color: var(--text-lo); font-style: italic;
    }

    /* ─── responsive ─── */
    @media (max-width: 639px) { .reports-grid { grid-template-columns: 1fr; } }
    @media (max-width: 480px) {
      .hamburger { display: flex; }
      .tab-bar { display: none; }
      .qbar .q-btn:nth-child(n+5):not(.bell-btn) { display: none; }
      .company-name { font-size: 11px; max-width: 150px; }
    }
  </style>
</head>
<body>

<!-- ── MOBILE DRAWER ── -->
<div class="drawer-overlay" id="drawerOverlay">
  <div class="drawer">

      <span class="drawer-title">القائمة الرئيسية</span>
      <button class="drawer-close" onclick="closeDrawer()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>

    </div>

  </div>
</div>

<header class="header">
  <div class="brand">
    <div class="logo-ring"><span>H</span></div>
    <div class="brand-words">
      <span class="company-name">مؤسسة متوكل لمواد البناء</span>

  <div class="hdr-actions">

<!-- ── SUB-HEADER ── -->
<div class="sub-hdr">
  <span class="lang-pill">عربي</span>
  <span id="clock">PM 00:00:00</span>
</div>

<!-- ── TAB BAR ── -->
<nav class="tab-bar">
  <div class="tab-list" id="tabList"></div>
</nav>

<!-- ── MODULE STRIP ── -->
<div class="module-section">
  <div class="module-strip" id="moduleStrip"></div>
</div>

<!-- ── SUB-REPORTS ── -->
<section class="reports-section">
  <div class="reports-heading">
    <div class="reports-heading-bar"></div>
    <span id="rTitle">تقارير العملاء والموردين</span>
  </div>
  <div class="reports-grid" id="rGrid"></div>
</section>

<script>
/* ══════════════════════════════════════════
   CLOCK
══════════════════════════════════════════ */
function tick() {
  const d = new Date();
  let h = d.getHours();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  const mm = String(d.getMinutes()).padStart(2,'0');
  const ss = String(d.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent =
    `${ampm} ${String(h).padStart(2,'0')}:${mm}:${ss}`;
}
tick(); setInterval(tick, 1000);

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let activeTab = 'reports';
let activeMod = 'customers';

/* ══════════════════════════════════════════
   RENDER: quick-action bar
══════════════════════════════════════════ */
function renderQBar() {
  const el = document.getElementById('qbar');
  el.innerHTML = QBTNS.map(b =>
    `<button class="q-btn" title="${b.t}">${b.s}</button>`
  ).join('') +
  `<div class="q-btn bell-wrap" style="position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:6px;" title="الإشعارات">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.6">
      <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 01-3.46 0"/>
    </svg>
    <span class="bell-badge">2</span>
  </div>`;
}

/* ══════════════════════════════════════════
   RENDER: tabs
══════════════════════════════════════════ */
function renderTabs() {
  const list   = document.getElementById('tabList');
  const drawer = document.getElementById('drawerTabs');

  list.innerHTML = TABS.map(t =>
    `<div class="tab-item${t.id===activeTab?' active':''}" onclick="setTab('${t.id}')">
      ${t.svg}<span>${t.label}</span>
    </div>`
  ).join('');

  drawer.innerHTML = TABS.map(t =>
    `<div class="drawer-tab${t.id===activeTab?' active':''}"
          onclick="setTab('${t.id}');closeDrawer()">
      ${t.svg}<span>${t.label}</span>
    </div>`
  ).join('');
}

/* ══════════════════════════════════════════
   RENDER: module strip
══════════════════════════════════════════ */
function renderStrip() {
  document.getElementById('moduleStrip').innerHTML = MODS.map(m =>
    `<div class="mod-item${m.id===activeMod?' active':''}" onclick="setMod('${m.id}')">
      <div class="mod-icon-bg">${m.icon}</div>
      <div class="mod-label">${m.label}</div>
      <div class="mod-tail"></div>
    </div>`
  ).join('');
}

/* ══════════════════════════════════════════
   RENDER: sub-reports
══════════════════════════════════════════ */
function renderReports() {
  const mod = MODS.find(m => m.id === activeMod);
  document.getElementById('rTitle').textContent =
    mod ? `تقارير ${mod.label}` : 'التقارير';

  const grid = document.getElementById('rGrid');
  if (!mod || !mod.reports.length) {
    grid.innerHTML = `<div class="empty-state">لا توجد تقارير متاحة لهذا القسم</div>`;
    return;
  }
  grid.innerHTML = mod.reports.map(r =>
    `<div class="report-row"><div class="dot"></div><span>${r}</span></div>`
  ).join('');
}

/* ══════════════════════════════════════════
   STATE SETTERS
══════════════════════════════════════════ */
function setTab(id) { activeTab = id; renderTabs(); }

function setMod(id) {
  activeMod = id;
  renderStrip();
  renderReports();
  const strip  = document.getElementById('moduleStrip');
  const active = strip.querySelector('.active');
  if (active) active.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
}

/* ══════════════════════════════════════════
   DRAWER
══════════════════════════════════════════ */
function openDrawer() {
  document.getElementById('drawerOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDrawer(e) {
  if (e && e.target !== document.getElementById('drawerOverlay')) return;
  document.getElementById('drawerOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('drawerOverlay').addEventListener('click', closeDrawer);

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
renderQBar();
renderTabs();
renderStrip();
renderReports();
</script>
