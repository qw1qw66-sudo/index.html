<style>
:root{--bg:#10141d;--card:#1b2430;--card2:#253142;--line:#3a495c;--txt:#fff7ec;--muted:#c7b9aa;--gold:#d7b46a;--red:#e06b61;--ok:#77b26d;--blue:#79adff}html,body{direction:rtl;margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif}body{padding-bottom:calc(88px + max(16px,env(safe-area-inset-bottom)))}*{box-sizing:border-box}input,select,textarea,button{font:inherit}input,select,textarea{width:100%;background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:14px;padding:13px;font-size:16px;outline:none}textarea{min-height:84px}.ltr{direction:ltr;text-align:left}.wrap{max-width:980px;margin:auto;padding:16px}.card,.item{background:linear-gradient(180deg,var(--card),#151b25);border:1px solid var(--line);border-radius:20px;padding:16px;margin:12px 0;box-shadow:0 14px 32px rgba(0,0,0,.22)}.title{font-size:27px;margin:6px 0 5px;font-weight:900}.sub,.small{color:var(--muted);line-height:1.6}.small{font-size:12px}.row,.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{min-height:45px;border:1px solid transparent;border-radius:14px;padding:10px 14px;font-weight:900;color:inherit;background:var(--card);display:inline-flex;align-items:center;justify-content:center;gap:7px;text-decoration:none}.btn:disabled{opacity:.45}.primary{background:linear-gradient(135deg,#f2d08a,var(--gold));color:#17120a}.outline{border-color:var(--line)}.danger{border-color:rgba(224,107,97,.55);color:var(--red);background:rgba(224,107,97,.11)}.full{width:100%}.top{position:sticky;top:0;z-index:10;background:rgba(16,20,29,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:calc(10px + env(safe-area-inset-top)) 14px 10px}.brand{display:flex;justify-content:space-between;align-items:center;gap:10px}.brand h1{font-size:18px;margin:0}.hidden{display:none!important}.view{display:none}.view.on{display:block}.tabs{position:fixed;bottom:0;left:0;right:0;z-index:20;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;background:rgba(16,20,29,.96);border-top:1px solid var(--line);padding:8px 6px max(16px,env(safe-area-inset-bottom));backdrop-filter:blur(14px)}.tabs button{border:0;background:transparent;color:var(--muted);border-radius:12px;min-height:50px;font-size:11px;font-weight:900}.tabs button.on{background:rgba(215,180,106,.13);color:var(--gold)}.toast{display:none;position:fixed;top:calc(12px + env(safe-area-inset-top));left:12px;right:12px;z-index:90;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px 14px}.toast.on{display:block}.toast.bad{border-color:var(--red)}.toast.good{border-color:var(--ok)}.badge{display:inline-block;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:900}.confirmed{background:rgba(119,178,109,.15);color:var(--ok)}.pending{background:rgba(215,180,106,.15);color:var(--gold)}.cancelled{background:rgba(224,107,97,.15);color:var(--red)}.completed{background:rgba(150,150,150,.15);color:var(--muted)}.meta{display:flex;gap:7px;flex-wrap:wrap;color:var(--muted);font-size:13px;margin-top:6px}.actions{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}.mini{min-height:35px;font-size:13px;padding:7px 10px}.empty{text-align:center;color:var(--muted);padding:25px 8px}.modal{display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.6);padding:18px;overflow:auto}.modal.on{display:block}.sheet{max-width:720px;margin:30px auto;background:var(--bg);border:1px solid var(--line);border-radius:22px;padding:16px}.close{float:left}.periodBox{border:1px solid var(--line);border-radius:16px;padding:10px;margin:8px 0}.voucher{background:#fffaf2;color:#1e1b17;border-radius:18px;overflow:hidden}.vtop{background:#171b24;color:#d7b46a;text-align:center;padding:16px}.vbody{padding:14px}.vrow{display:flex;justify-content:space-between;gap:15px;border-bottom:1px dashed #d8cab6;padding:9px 0}.vrow b{text-align:left;word-break:break-word}@media(max-width:700px){.row,.grid{grid-template-columns:1fr}.wrap{padding:14px}.brand{align-items:flex-start}.brand .btn{min-width:120px}}
</style>

<body>
<div id="toast" class="toast"></div>
<section id="connectView" class="wrap">
  <div class="card" style="max-width:560px;margin:40px auto">
    <h1 class="title">ربط مساحة الحجوزات</h1>
    <p class="sub">اكتب رمز المساحة والـ PIN. إذا كانت جديدة اضغط إنشاء مساحة جديدة. لا توجد بيانات تجريبية.</p>
    <div class="row"><div><label>Workspace Code</label><input id="workspaceKey" class="ltr" autocomplete="off" placeholder="مثال: ALI6"></div><div><label>PIN</label><input id="accessPin" class="ltr" type="password" autocomplete="off" placeholder="4 أرقام أو أكثر"></div></div>
    <button id="connectBtn" class="btn primary full" style="margin-top:12px">سحب مساحة موجودة</button>
    <button id="createWorkspaceBtn" class="btn outline full" style="margin-top:8px">إنشاء مساحة جديدة فارغة</button>
    <p id="connectMsg" class="small">إذا ظهرت رسالة SQL/RPC، شغّل ملف database/shared_workspace_sync.sql في Supabase.</p>
  </div>
</section>
<div id="appView" class="hidden">
<header class="top"><div class="brand"><div><h1 id="facilityTitle">نظام الحجوزات</h1><div id="syncStatus" class="small">—</div></div><button id="uploadBtn" class="btn primary" disabled>رفع التعديلات</button></div></header>
<main class="wrap">
<section id="home" class="view on"><h2 class="title">الرئيسية</h2><div class="grid"><div class="card"><span class="small">الشاليهات</span><h2 id="countChalets">0</h2></div><div class="card"><span class="small">الحجوزات</span><h2 id="countBookings">0</h2></div></div><div id="homeList"></div></section>
<section id="chalets" class="view"><h2 class="title">الشاليهات</h2><button id="newChaletBtn" class="btn outline full">+ إضافة شاليه</button><div id="chaletList"></div></section>
<section id="bookings" class="view"><h2 class="title">الحجوزات</h2><button id="newBookingBtn" class="btn outline full">+ إضافة حجز</button><div id="bookingList"></div></section>
<section id="calendar" class="view"><h2 class="title">التقويم</h2><div id="calendarList"></div></section>
<section id="settings" class="view"><h2 class="title">الإعدادات</h2><div class="card"><label>اسم المنشأة</label><input id="facilityName"><label>وصف مختصر</label><input id="facilityTag"><button id="saveSettingsBtn" class="btn primary full" style="margin-top:10px">حفظ محليًا</button></div><button id="pullBtn" class="btn outline full">سحب من السحابة</button><button id="logoutBtn" class="btn danger full" style="margin-top:8px">خروج من المساحة</button></section>
</main>
<nav class="tabs"><button class="on" data-tab="home">⌂<br>الرئيسية</button><button data-tab="bookings">☷<br>الحجوزات</button><button data-tab="calendar">▦<br>التقويم</button><button data-tab="chalets">⌘<br>الشاليهات</button><button data-tab="settings">⚙<br>الإعدادات</button></nav>
</div>
<div id="modal" class="modal"><div class="sheet"><button id="closeModal" class="btn outline mini close">×</button><div id="modalBody" style="clear:both"></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(()=>{'use strict';
const SUPABASE_URL='https://fkqidesfrtpwzjcimjoe.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_Uks_PYr6aqY5wnNBjDjTgg_z2Ic6_al';
const CREDS_KEY='app_workspace_creds_v4';
const CACHE_KEY='app_workspace_cache_v4';
const BACKUP_INDEX='app_push_backup_index_v4';
const REQUIRED_PHRASE='أؤكد استبدال بيانات السحابة';
const $=id=>document.getElementById(id);const q=s=>Array.from(document.querySelectorAll(s));
let sb,state=emptyDoc(),workspaceKey='',accessPin='',workspaceLoaded=false,lastCloudPullAt='',lastCloudCounts=null,lastCloudUpdatedAt='',dirty=false;
function emptyDoc(){return{schema_version:3,updated_at:'',settings:{facility_name:'',tag:'',holidays:[]},chalets:[],bookings:[]}}
function now(){return new Date().toISOString()}function uid(){return crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2)}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function toast(m,t='good'){const el=$('toast');el.textContent=m;el.className='toast on '+t;clearTimeout(toast.t);toast.t=setTimeout(()=>el.className='toast',3500)}
function msg(m,b=false){$('connectMsg').textContent=m;$('connectMsg').style.color=b?'var(--red)':'var(--muted)'}
function client(){if(!window.supabase?.createClient)throw new Error('مكتبة Supabase لم تعمل. تأكد من الإنترنت ثم حدث الصفحة.');if(!sb)sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);return sb}
function cleanKey(v){return String(v||'').trim().toUpperCase().replace(/[^A-Z0-9_-]/g,'')}
function counts(doc=state){return{chalets:(doc.chalets||[]).filter(x=>!x.deleted_at).length,bookings:(doc.bookings||[]).filter(x=>!x.deleted_at).length}}
function activeChalets(){return(state.chalets||[]).filter(x=>!x.deleted_at)}function activeBookings(){return(state.bookings||[]).filter(x=>!x.deleted_at)}
function normalize(doc){const src=doc&&doc.data?doc.data:doc||{};const out=emptyDoc();out.updated_at=String(src.updated_at||'');out.settings={facility_name:String(src.settings?.facility_name||''),tag:String(src.settings?.tag||''),holidays:Array.isArray(src.settings?.holidays)?src.settings.holidays:[]};out.chalets=Array.isArray(src.chalets)?src.chalets.map(c=>({id:String(c.id||uid()),name:String(c.name||''),capacity:Number(c.capacity||0),description:String(c.description||''),contactPhone:String(c.contactPhone||''),workerPhone:String(c.workerPhone||''),workerName:String(c.workerName||''),mapUrl:String(c.mapUrl||''),terms:String(c.terms||''),color:String(c.color||''),periods:Array.isArray(c.periods)?c.periods.map((p,i)=>({id:String(p.id||uid()),label:String(p.label||''),start:String(p.start||''),end:String(p.end||''),weekday_price:Number(p.weekday_price||0),weekend_price:Number(p.weekend_price||0),active:p.active!==false,sort:Number(p.sort??i)})):[],deleted_at:c.deleted_at||null,updated_at:String(c.updated_at||now())})):[];out.bookings=Array.isArray(src.bookings)?src.bookings.map(b=>({id:String(b.id||uid()),customer_name:String(b.customer_name||''),customer_phone:String(b.customer_phone||''),chalet_id:String(b.chalet_id||''),booking_date:String(b.booking_date||''),period_id:String(b.period_id||''),guests:Number(b.guests||1),total:Number(b.total||0),paid:Number(b.paid||0),status:['confirmed','pending','cancelled','completed'].includes(b.status)?b.status:'confirmed',notes:String(b.notes||''),deleted_at:b.deleted_at||null,created_at:String(b.created_at||now()),updated_at:String(b.updated_at||now())})):[];return out}
function localSave(){localStorage.setItem(CACHE_KEY,JSON.stringify({workspaceKey,state,lastCloudCounts,lastCloudUpdatedAt,lastCloudPullAt,dirty,timestamp:now()}))}
function markDirty(){dirty=true;localSave();render()}
function getInputs(){workspaceKey=cleanKey($('workspaceKey').value);accessPin=$('accessPin').value.trim();if(!workspaceKey||accessPin.length<4)throw new Error('اكتب رمز مساحة صحيح وPIN من 4 خانات أو أكثر.');}
async function pull(first=false){getInputs();msg('جاري الاتصال بـ Supabase...');const res=await client().rpc('get_shared_workspace',{p_workspace_key:workspaceKey,p_access_pin:accessPin});if(res.error)throw new Error(readableError(res.error));state=normalize(res.data);workspaceLoaded=true;lastCloudPullAt=now();lastCloudCounts=counts();lastCloudUpdatedAt=state.updated_at||'';dirty=false;localStorage.setItem(CREDS_KEY,JSON.stringify({workspaceKey,accessPin}));localSave();showApp();toast(first&&lastCloudCounts.chalets+lastCloudCounts.bookings===0?'تم السحب: المساحة فارغة.':'تم سحب البيانات.');render()}
async function createWorkspace(){getInputs();msg('جاري إنشاء مساحة فارغة...');const blank=emptyDoc();const res=await client().rpc('save_shared_workspace',{p_workspace_key:workspaceKey,p_access_pin:accessPin,p_data:blank});if(res.error)throw new Error(readableError(res.error));state=normalize(res.data||blank);workspaceLoaded=true;lastCloudPullAt=now();lastCloudCounts=counts();lastCloudUpdatedAt=state.updated_at||'';dirty=false;localStorage.setItem(CREDS_KEY,JSON.stringify({workspaceKey,accessPin}));localSave();showApp();toast('تم إنشاء مساحة جديدة فارغة بدون بيانات تجريبية.');render()}
function readableError(e){const m=e.message||String(e);if(m.includes('Could not find the function')||m.includes('get_shared_workspace')||m.includes('save_shared_workspace'))return 'دوال الربط غير موجودة. شغّل database/shared_workspace_sync.sql في Supabase.';if(m.includes('WORKSPACE_NOT_FOUND_OR_PIN_INVALID'))return 'المساحة غير موجودة أو الرقم السري غير صحيح. إذا هذه أول مرة، اضغط إنشاء مساحة جديدة فارغة.';if(m.includes('Failed to fetch'))return 'فشل الاتصال. تأكد من الإنترنت أو إعدادات Supabase.';return m}
function showApp(){$('connectView').classList.add('hidden');$('appView').classList.remove('hidden')}
function canPush(){return workspaceKey&&accessPin&&workspaceLoaded&&lastCloudPullAt&&lastCloudCounts}
function backup(){const key='backup_before_cloud_push_'+now();localStorage.setItem(key,JSON.stringify({workspace_key:workspaceKey,counts:counts(),data:state,timestamp:now()}));let idx=JSON.parse(localStorage.getItem(BACKUP_INDEX)||'[]');idx.push(key);idx=idx.slice(-10);localStorage.setItem(BACKUP_INDEX,JSON.stringify(idx))}
async function upload(){if(!canPush())return toast('لا يمكن الرفع قبل سحب ناجح من السحابة.','bad');const c=counts();if(c.chalets===0&&c.bookings===0&&(lastCloudCounts.chalets>0||lastCloudCounts.bookings>0))return toast('تم إيقاف الرفع: البيانات المحلية فارغة وستحذف بيانات السحابة.','bad');const drop=(lastCloudCounts.chalets-c.chalets>=1)||(lastCloudCounts.bookings>=3&&(lastCloudCounts.bookings-c.bookings)>=3&&c.bookings<=lastCloudCounts.bookings*.8);if(drop){const v=prompt('اكتب العبارة للتأكيد:\n'+REQUIRED_PHRASE);if(v!==REQUIRED_PHRASE)return toast('تم إلغاء الرفع.','bad')}
$('uploadBtn').disabled=true;try{const fresh=await client().rpc('get_shared_workspace',{p_workspace_key:workspaceKey,p_access_pin:accessPin});if(fresh.error)throw new Error(readableError(fresh.error));const freshDoc=normalize(fresh.data);if((freshDoc.updated_at||'')!==lastCloudUpdatedAt)return toast('تم إيقاف الرفع: توجد نسخة أحدث في السحابة. اسحب البيانات أولًا.','bad');backup();const res=await client().rpc('save_shared_workspace',{p_workspace_key:workspaceKey,p_access_pin:accessPin,p_data:state});if(res.error)throw new Error(readableError(res.error));state=normalize(res.data||state);lastCloudPullAt=now();lastCloudCounts=counts();lastCloudUpdatedAt=state.updated_at||'';dirty=false;localSave();toast('تم رفع التعديلات.');render()}catch(e){toast('فشل الرفع: '+e.message,'bad')}finally{$('uploadBtn').disabled=false;render()}}
function ch(id){return activeChalets().find(x=>x.id===id)}function per(c,id){return(c?.periods||[]).find(x=>x.id===id)}
function ymd(d){return d.split('-').map(Number)}function ts(d,t){const [y,m,day]=ymd(d);const [h,mi]=String(t||'00:00').split(':').map(Number);return Date.UTC(y,m-1,day,h-3,mi||0)}
function rng(b){const c=ch(b.chalet_id),p=per(c,b.period_id);if(!p)return null;let s=ts(b.booking_date,p.start),e=ts(b.booking_date,p.end);if(e<=s)e+=86400000;return{s,e}}
function conflict(n){if(n.status!=='confirmed')return null;const nr=rng(n);if(!nr)return null;return activeBookings().find(b=>b.id!==n.id&&b.chalet_id===n.chalet_id&&b.status==='confirmed'&&rng(b)&&rng(b).s<nr.e&&rng(b).e>nr.s)||null}
function money(n){return new Intl.NumberFormat('en-US').format(Number(n||0))}function today(){return new Date(Date.now()+10800000).toISOString().slice(0,10)}
function render(){if(!workspaceLoaded)return;const c=counts();$('facilityTitle').textContent=state.settings.facility_name||'نظام الحجوزات';$('syncStatus').textContent=dirty?'تعديلات محلية غير مرفوعة':'متصل: '+workspaceKey;$('uploadBtn').disabled=!dirty;$('countChalets').textContent=c.chalets;$('countBookings').textContent=c.bookings;$('facilityName').value=state.settings.facility_name||'';$('facilityTag').value=state.settings.tag||'';renderChalets();renderBookings();renderCalendar();$('homeList').innerHTML=activeBookings().slice(0,4).map(bookingCard).join('')||'<div class="empty">لا توجد حجوزات.</div>';}
function chaletCard(c){return`<div class="item"><div class="actions"><div><b>${esc(c.name)}</b><div class="meta"><span>الفترات: ${(c.periods||[]).length}</span><span>السعة: ${c.capacity||0}</span></div></div><button class="btn outline mini" onclick="app.editChalet('${c.id}')">تعديل</button></div></div>`}
function bookingCard(b){const c=ch(b.chalet_id),p=per(c,b.period_id);return`<div class="item"><div class="actions"><div><b>${esc(b.customer_name)}</b><div class="meta"><span>${esc(c?.name||'—')}</span><span>${esc(b.booking_date)}</span><span>${esc(p?.label||'—')}</span></div></div><span class="badge ${b.status}">${esc(b.status)}</span></div><div class="actions"><span>${money(b.total)} ر.س</span><div><button class="btn outline mini" onclick="app.voucher('${b.id}')">السند</button><button class="btn outline mini" onclick="app.editBooking('${b.id}')">تعديل</button></div></div></div>`}
function renderChalets(){$('chaletList').innerHTML=activeChalets().map(chaletCard).join('')||'<div class="empty">لا توجد شاليهات.</div>'}
function renderBookings(){$('bookingList').innerHTML=activeBookings().map(bookingCard).join('')||'<div class="empty">لا توجد حجوزات.</div>'}
function renderCalendar(){const by={};activeBookings().forEach(b=>(by[b.booking_date]||(by[b.booking_date]=[])).push(b));$('calendarList').innerHTML=Object.keys(by).sort().map(d=>`<div class="item"><b>${d}</b>${by[d].map(bookingCard).join('')}</div>`).join('')||'<div class="empty">لا يوجد تقويم.</div>'}
function open(html){$('modalBody').innerHTML=html;$('modal').classList.add('on')}function close(){$('modal').classList.remove('on')}
function chaletForm(id=''){const c=id?ch(id):{id:'',name:'',capacity:0,description:'',contactPhone:'',workerPhone:'',workerName:'',mapUrl:'',terms:'',periods:[]};open(`<h2>${id?'تعديل':'إضافة'} شاليه</h2><input id="f_id" value="${esc(c.id)}" hidden><label>الاسم</label><input id="f_name" value="${esc(c.name)}"><div class="row"><div><label>السعة</label><input id="f_cap" type="number" value="${c.capacity||0}"></div><div><label>رقم التواصل</label><input id="f_contact" class="ltr" value="${esc(c.contactPhone)}"></div></div><label>رقم العامل</label><input id="f_workerPhone" class="ltr" value="${esc(c.workerPhone)}"><label>اسم العامل</label><input id="f_workerName" value="${esc(c.workerName)}"><label>الخريطة</label><input id="f_map" class="ltr" value="${esc(c.mapUrl)}"><label>الشروط</label><textarea id="f_terms">${esc(c.terms)}</textarea><h3>الفترات</h3><div id="periodsBox">${(c.periods||[]).map(periodForm).join('')}</div><button class="btn outline full" onclick="app.addPeriod()">+ فترة</button><button class="btn primary full" style="margin-top:10px" onclick="app.saveChalet()">حفظ</button>`)}
function periodForm(p={id:'',label:'',start:'07:00',end:'17:00',weekday_price:0,weekend_price:0}){return`<div class="periodBox"><input data-pid value="${esc(p.id||uid())}" hidden><label>اسم الفترة</label><input data-plabel value="${esc(p.label)}"><div class="row"><input data-pstart type="time" value="${esc(p.start)}"><input data-pend type="time" value="${esc(p.end)}"></div><div class="row"><input data-pweek type="number" placeholder="سعر عادي" value="${p.weekday_price||0}"><input data-pwend type="number" placeholder="سعر ويكند" value="${p.weekend_price||0}"></div></div>`}
function saveChalet(){const id=$('f_id').value||uid();const periods=q('.periodBox').map((r,i)=>({id:r.querySelector('[data-pid]').value,label:r.querySelector('[data-plabel]').value.trim(),start:r.querySelector('[data-pstart]').value,end:r.querySelector('[data-pend]').value,weekday_price:Number(r.querySelector('[data-pweek]').value||0),weekend_price:Number(r.querySelector('[data-pwend]').value||0),active:true,sort:i})).filter(p=>p.label&&p.start&&p.end);const c={id,name:$('f_name').value.trim(),capacity:Number($('f_cap').value||0),description:'',contactPhone:$('f_contact').value.trim(),workerPhone:$('f_workerPhone').value.trim(),workerName:$('f_workerName').value.trim(),mapUrl:$('f_map').value.trim(),terms:$('f_terms').value.trim(),color:'',periods,deleted_at:null,updated_at:now()};if(!c.name)return toast('اسم الشاليه مطلوب.','bad');const i=state.chalets.findIndex(x=>x.id===id);if(i>=0)state.chalets[i]=c;else state.chalets.push(c);close();markDirty();toast('تم الحفظ محليًا.')}
function bookingForm(id=''){if(!activeChalets().length)return toast('أضف شاليه وفترة أولًا.','bad');const b=id?activeBookings().find(x=>x.id===id):{id:'',customer_name:'',customer_phone:'',chalet_id:activeChalets()[0].id,booking_date:today(),period_id:'',guests:1,total:0,paid:0,status:'confirmed',notes:''};open(`<h2>${id?'تعديل':'إضافة'} حجز</h2><input id="b_id" value="${esc(b.id)}" hidden><label>اسم العميل</label><input id="b_name" value="${esc(b.customer_name)}"><label>الجوال</label><input id="b_phone" class="ltr" value="${esc(b.customer_phone)}"><div class="row"><div><label>الشاليه</label><select id="b_chalet" onchange="app.fillPeriods()">${activeChalets().map(c=>`<option value="${c.id}" ${c.id===b.chalet_id?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div><div><label>التاريخ</label><input id="b_date" type="date" value="${esc(b.booking_date)}"></div></div><label>الفترة</label><select id="b_period"></select><div class="row"><input id="b_guests" type="number" min="1" value="${b.guests||1}"><select id="b_status"><option value="confirmed">confirmed</option><option value="pending">pending</option><option value="cancelled">cancelled</option><option value="completed">completed</option></select></div><div class="row"><input id="b_total" type="number" placeholder="الإجمالي" value="${b.total||0}"><input id="b_paid" type="number" placeholder="المدفوع" value="${b.paid||0}"></div><label>ملاحظات داخلية</label><textarea id="b_notes">${esc(b.notes)}</textarea><button class="btn primary full" style="margin-top:10px" onclick="app.saveBooking()">حفظ</button>`);$('b_status').value=b.status;fillPeriods(b.period_id)}
function fillPeriods(sel=''){const c=ch($('b_chalet').value);$('b_period').innerHTML=(c?.periods||[]).map(p=>`<option value="${p.id}" ${p.id===sel?'selected':''}>${esc(p.label)} ${p.start}-${p.end}</option>`).join('')}
function saveBooking(){const id=$('b_id').value||uid();const b={id,customer_name:$('b_name').value.trim(),customer_phone:$('b_phone').value.trim(),chalet_id:$('b_chalet').value,booking_date:$('b_date').value,period_id:$('b_period').value,guests:Number($('b_guests').value||1),total:Number($('b_total').value||0),paid:Number($('b_paid').value||0),status:$('b_status').value,notes:$('b_notes').value.trim(),deleted_at:null,created_at:(activeBookings().find(x=>x.id===id)?.created_at)||now(),updated_at:now()};if(!b.customer_name||!b.customer_phone||!b.period_id)return toast('أكمل بيانات الحجز.','bad');const hit=conflict(b);if(hit)return toast('يوجد حجز مؤكد متعارض: '+hit.customer_name,'bad');const i=state.bookings.findIndex(x=>x.id===id);if(i>=0)state.bookings[i]=b;else state.bookings.push(b);close();markDirty();showTab('bookings')}
function voucher(id){const b=activeBookings().find(x=>x.id===id),c=ch(b?.chalet_id),p=per(c,b?.period_id);if(!b||!c)return;const text=`${state.settings.facility_name||''}\nالشاليه: ${c.name}\nالعميل: ${b.customer_name}\nالجوال: ${b.customer_phone}\nالتاريخ: ${b.booking_date}\nالفترة: ${p?.label||''}\nالدخول: ${p?.start||''}\nالخروج: ${p?.end||''}\nالضيوف: ${b.guests}\nالإجمالي: ${money(b.total)} ر.س\nالمدفوع: ${money(b.paid)} ر.س\nالمتبقي: ${money(b.total-b.paid)} ر.س\nرقم التواصل: ${c.contactPhone}\nرقم العامل: ${c.workerPhone}\nاسم العامل: ${c.workerName}\nالموقع: ${c.mapUrl}\nالشروط: ${c.terms}`;open(`<div class="voucher"><div class="vtop"><b>سند الحجز</b></div><div class="vbody">${text.split('\n').map(x=>`<div class="vrow"><span>${esc(x.split(':')[0])}</span><b>${esc(x.includes(':')?x.slice(x.indexOf(':')+1):x)}</b></div>`).join('')}</div></div><button class="btn primary full" style="margin-top:10px" onclick="app.shareVoucher()">مشاركة السند</button>`);window.__voucherText=text}
async function shareVoucher(){try{if(navigator.share){await navigator.share({text:window.__voucherText});toast('تم فتح المشاركة.')}else{await navigator.clipboard.writeText(window.__voucherText);toast('تم نسخ السند.')}}catch(e){toast('تعذر المشاركة أو النسخ.','bad')}}
function showTab(id){q('.view').forEach(v=>v.classList.remove('on'));$(id).classList.add('on');q('.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.tab===id));render()}
$('connectBtn').onclick=()=>pull(true).catch(e=>msg('فشل الربط: '+e.message,true));$('createWorkspaceBtn').onclick=()=>createWorkspace().catch(e=>msg('فشل الإنشاء: '+e.message,true));$('uploadBtn').onclick=upload;$('pullBtn').onclick=()=>pull(false).catch(e=>toast('فشل السحب: '+e.message,'bad'));$('newChaletBtn').onclick=()=>chaletForm();$('newBookingBtn').onclick=()=>bookingForm();$('saveSettingsBtn').onclick=()=>{state.settings.facility_name=$('facilityName').value.trim();state.settings.tag=$('facilityTag').value.trim();markDirty();toast('تم الحفظ محليًا.')};$('logoutBtn').onclick=()=>{localStorage.removeItem(CREDS_KEY);location.reload()};$('closeModal').onclick=close;$('modal').onclick=e=>{if(e.target.id==='modal')close()};q('.tabs button').forEach(b=>b.onclick=()=>showTab(b.dataset.tab));
window.app={editChalet:chaletForm,saveChalet,addPeriod(){ $('periodsBox').insertAdjacentHTML('beforeend',periodForm())},editBooking:bookingForm,saveBooking,fillPeriods,voucher,shareVoucher};
try{const c=JSON.parse(localStorage.getItem(CREDS_KEY)||'{}');if(c.workspaceKey&&c.accessPin){$('workspaceKey').value=c.workspaceKey;$('accessPin').value=c.accessPin;workspaceKey=c.workspaceKey;accessPin=c.accessPin;pull(true).catch(e=>msg('فشل السحب التلقائي: '+e.message,true))}}catch{}
})();
</script>
</body>
</html>
