name: Deploy app only

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build clean artifact
        run: |
          rm -rf dist
          mkdir -p dist/app
          cp -R app/* dist/app/
          cp app-release/index.html dist/app/index.html
          cp clean.html dist/clean.html
          cp stable.html dist/stable.html
          cp 404.html dist/404.html
          find dist -maxdepth 3 -type f | sort
          test -f dist/stable.html
          test -f dist/clean.html
          test -f dist/app/index.html
          test -f dist/app/manifest.webmanifest
          test -f dist/404.html
          test ! -e dist/app.html
          test ! -e dist/cloud.html
          test ! -e dist/sync-cloud
          test ! -e dist/app-release
          test ! -e dist/archive

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        uses: actions/deploy-pages@v4
