name: Deploy clean root app

# GitHub Pages is the CANONICAL public app. Deploys on every push to main and
# on manual dispatch. It NEVER deploys from a pull_request event (previews are
# Netlify's job). The build version is injected from the commit SHA at artifact
# time, so no static version is committed per release.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize releases; let an in-progress deploy finish (never cancel a publish).
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Pages artifact (only public app files)
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          short="${GITHUB_SHA:0:7}"
          rm -rf dist
          mkdir -p dist
          cp index.html dist/index.html
          cp 404.html dist/404.html

          # Inject the real build version (main-<short sha>) into dist ONLY.
          # __APP_BUILD__ is the committed placeholder; the source never carries
          # a per-release static version.
          sed -i "s/__APP_BUILD__/main-${short}/g; s/__APP_BUILD_SHA__/${GITHUB_SHA}/g" dist/index.html

          # Exactly the two files the public app needs — nothing else. No
          # supabase/, exports/, tests/, docs/, scripts/, database/, workflows,
          # node_modules, env files, or SQL.
          test -f dist/index.html
          test -f dist/404.html
          test "$(find dist -type f | wc -l)" -eq 2
          test ! -e dist/database
          test ! -e dist/supabase
          test ! -e dist/exports
          test ! -e dist/tests
          test ! -e dist/scripts
          # The placeholders must be fully replaced; the real version must appear.
          if grep -qF "__APP_BUILD" dist/index.html; then echo "build placeholder not replaced"; exit 1; fi
          grep -qF "main-${short}" dist/index.html
          grep -qF "${GITHUB_SHA}" dist/index.html
          find dist -maxdepth 2 -type f | sort

      - name: Leak scan (precise — real secrets only, not safe explanatory text)
        run: |
          set -euo pipefail
          # Secret VALUES / assignments only. Built from fragments so this step
          # itself never contains a literal secret token. Env-var NAMES and
          # security terms in explanatory copy are allowed.
          patterns=(
            "sk-[A-Za-z0-9]{20,}"                                  # DeepSeek/OpenAI-style key value
            "$(printf 'sb_%s_' secret)[A-Za-z0-9]{10,}"            # Supabase secret key value
            "$(printf 'service_%s' role)_key\"?\\s*[:=]\\s*\"?ey"  # service-role JWT assignment
            "$(printf 'eyJ')[A-Za-z0-9_-]{30,}\\.[A-Za-z0-9_-]{30,}\\.[A-Za-z0-9_-]{20,}"  # any JWT
            "-----BEGIN [A-Z ]*PRIVATE KEY-----"                  # private key block
            "DEEPSEEK_API_KEY\\s*[:=]\\s*[\"'][^\"']{8,}"          # assigned DeepSeek value
            "ASSISTANT_CONFIRM_SECRET\\s*[:=]\\s*[\"'][^\"']{8,}"  # assigned confirm secret
          )
          fail=0
          for p in "${patterns[@]}"; do
            if grep -REn -- "$p" dist/; then echo "LEAK: pattern matched -> $p"; fail=1; fi
          done
          # The publishable/anon key is expected and allowed (public by design).
          grep -qF "sb_publishable_" dist/index.html || { echo "expected publishable key missing"; exit 1; }
          # No committed env file may reach the artifact.
          if find dist -name ".env*" | grep -q .; then echo "LEAK: .env file in artifact"; fail=1; fi
          [ "$fail" -eq 0 ] || exit 1
          echo "leak scan clean"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
