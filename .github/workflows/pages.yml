name: Deploy clean root app

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Pages artifact
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/database
          cp index.html dist/index.html
          cp 404.html dist/404.html
          cp database/shared_workspace_sync.sql dist/database/shared_workspace_sync.sql

          test -f dist/index.html
          test -f dist/404.html
          test -f dist/database/shared_workspace_sync.sql

          test ! -e dist/app.html
          test ! -e dist/app-release
          test ! -e dist/clean.html
          test ! -e dist/stable.html
          test ! -e dist/sync-cloud
          test ! -e dist/cloud.html
          test ! -e dist/sw.js
          test ! -e dist/archive
          test ! -e dist/app
          test ! -e dist/manifest.webmanifest

          find dist -maxdepth 4 -type f | sort

      - name: Source inspection
        run: |
          set -euo pipefail
          files="dist/index.html dist/404.html dist/database/shared_workspace_sync.sql"
          forbidden=(
            "signInWithOtp"
            "Magic Link"
            "email login"
            "service_role"
            "serviceWorker"
            "sync-cloud"
            "location.replace"
            "window.location"
            "document.location"
            "http-equiv=\"refresh\""
          )
          for pattern in "${forbidden[@]}"; do
            if grep -RInF -- "$pattern" $files; then
              echo "Forbidden source pattern found: $pattern"
              exit 1
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        uses: actions/deploy-pages@v4
