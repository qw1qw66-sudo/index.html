name: Deploy clean root app

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build clean root artifact
        run: |
          rm -rf dist
          mkdir -p dist
          cp index.html dist/index.html
          cp 404.html dist/404.html
          find dist -maxdepth 4 -type f | sort
          test -f dist/index.html
          test -f dist/404.html
          test ! -e dist/app
          test ! -e dist/app.html
          test ! -e dist/cloud.html
          test ! -e dist/clean.html
          test ! -e dist/stable.html
          test ! -e dist/app-release
          test ! -e dist/sync-cloud
          test ! -e dist/archive
          test ! -e dist/manifest.webmanifest
          test ! -e dist/sw.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        uses: actions/deploy-pages@v4
