name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate safe Supabase browser config
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          cat > chalets-supabase-config.js <<'EOF'
          // Generated by GitHub Actions at deploy time.
          // Public anon key only. Never put service_role keys in browser code.
          window.CHALETS_SUPABASE_URL = "${VITE_SUPABASE_URL}";
          window.CHALETS_SUPABASE_ANON_KEY = "${VITE_SUPABASE_ANON_KEY}";
          window.VITE_SUPABASE_URL = window.CHALETS_SUPABASE_URL;
          window.VITE_SUPABASE_ANON_KEY = window.CHALETS_SUPABASE_ANON_KEY;
          EOF
          sed -i "s|\${VITE_SUPABASE_URL}|${VITE_SUPABASE_URL}|g" chalets-supabase-config.js
          sed -i "s|\${VITE_SUPABASE_ANON_KEY}|${VITE_SUPABASE_ANON_KEY}|g" chalets-supabase-config.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
