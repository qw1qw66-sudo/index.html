name: QA

on:
  pull_request:
  push:
    branches:
      - main
      - 'codex/**'

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build/static checks
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        run: npm run e2e
